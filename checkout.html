<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Checkout</title>

<script src="https://js.stripe.com/v3/"></script>

<style>
:root {
    --bg: #f6f6f7;
    --card: #ffffff;
    --text: #111;
    --muted: #777;
    --border: #e6e6e6;
}

body.dark {
    --bg: #0e0e11;
    --card: #16161a;
    --text: #fff;
    --muted: #aaa;
    --border: #2a2a2f;
}

body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.toggle {
    cursor: pointer;
    font-size: 14px;
}

.checkout {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 30px;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 25px;
    transition: 0.3s;
}

.field {
    position: relative;
    margin-bottom: 18px;
}

.field input {
    width: 100%;
    padding: 16px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    outline: none;
}

.field label {
    position: absolute;
    left: 12px;
    top: 14px;
    color: var(--muted);
    font-size: 13px;
    transition: 0.2s;
    pointer-events: none;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 11px;
    background: var(--card);
    padding: 0 5px;
}

.payment-option {
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
}

button {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.85;
}

.success {
    display: none;
    text-align: center;
    padding: 40px;
}

.success h2 {
    font-size: 24px;
}

@media(max-width: 900px) {
    .checkout {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <h2>Checkout</h2>
        <div class="toggle" onclick="toggleMode()">?? Toggle Mode</div>
    </div>

    <div id="checkoutUI" class="checkout">

        <!-- LEFT -->
        <div>

            <div class="card">
                <h3>Details</h3>

                <div class="field">
                    <input placeholder=" " id="name">
                    <label>Full Name</label>
                </div>

                <div class="field">
                    <input placeholder=" " id="email">
                    <label>Email</label>
                </div>

            </div>

            <div class="card">
                <h3>Payment</h3>

                <div class="payment-option">Card Payment</div>
                <div id="card-element"></div>

                <br>

                <div class="payment-option">M-Pesa</div>
                <div class="field">
                    <input placeholder=" " id="phone">
                    <label>Phone (2547XXXXXXXX)</label>
                </div>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="card">
            <h3>Summary</h3>

            <p>Product: $120</p>
            <p>Shipping: $10</p>
            <hr>
            <h3>Total: $130</h3>

            <button onclick="pay()">Complete Payment</button>
        </div>

    </div>

    <!-- SUCCESS -->
    <div id="successUI" class="success">
        <h2>?? Payment Successful</h2>
        <p>Your order has been placed successfully.</p>
    </div>

</div>

<script>
const stripe = Stripe("YOUR_PUBLIC_KEY");
const elements = stripe.elements();
const card = elements.create("card");
card.mount("#card-element");

function toggleMode() {
    document.body.classList.toggle("dark");
}

async function pay() {
    // Simulated success (replace with backend call)
    document.getElementById("checkoutUI").style.display = "none";
    document.getElementById("successUI").style.display = "block";
}
</script>

</body>
</html>
