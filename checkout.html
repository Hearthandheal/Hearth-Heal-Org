<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Checkout</title>

<style>
:root {
    --bg: #f8f8f8;
    --card: #ffffff;
    --text: #111;
    --muted: #777;
    --border: #e5e5e5;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 50px 20px;
}

h1 {
    font-weight: 500;
    margin-bottom: 30px;
}

.checkout {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 40px;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 25px;
}

.section-title {
    font-size: 16px;
    margin-bottom: 15px;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 14px;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: #111;
}

.row {
    display: flex;
    gap: 15px;
}

.row input {
    flex: 1;
}

.payment-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid var(--border);
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.payment-option:hover {
    border-color: #111;
}

.payment-option input {
    margin-right: 10px;
}

.summary-line {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    color: var(--muted);
}

.total {
    font-size: 18px;
    font-weight: 600;
    color: #111;
}

button {
    width: 100%;
    padding: 15px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    background: #333;
}

.footer-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 15px;
    text-align: center;
}

@media(max-width: 900px) {
    .checkout {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Secure Checkout</h1>

    <div class="checkout">

        <!-- LEFT -->
        <div>

            <div class="card">
                <div class="section-title">Contact Information</div>
                <input type="text" placeholder="Full Name">
                <input type="email" placeholder="Email Address">
            </div>

            <div class="card">
                <div class="section-title">Shipping Address</div>
                <input type="text" placeholder="Address">
                <div class="row">
                    <input type="text" placeholder="City">
                    <input type="text" placeholder="Postal Code">
                </div>
                <input type="text" placeholder="Country">
            </div>

            <div class="card">
                <div class="section-title">Payment Method</div>

                <label class="payment-option">
                    <div>
                        <input type="radio" name="pay" checked>
                        Card Payment
                    </div>
                </label>

                <label class="payment-option">
                    <div>
                        <input type="radio" name="pay">
                        M-Pesa
                    </div>
                </label>

                <input type="text" placeholder="Card Number">
                <div class="row">
                    <input type="text" placeholder="Expiry">
                    <input type="text" placeholder="CVV">
                </div>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="card">
            <div class="section-title">Order Summary</div>

            <div class="summary-line">
                <span>Product</span>
                <span>$120</span>
            </div>

            <div class="summary-line">
                <span>Shipping</span>
                <span>$10</span>
            </div>

            <hr>

            <div class="summary-line total">
                <span>Total</span>
                <span>$130</span>
            </div>

            <button onclick="checkout()">Complete Payment</button>

            <div class="footer-note">
                Secure encrypted payment
            </div>
        </div>

    </div>

</div>

<script>
function checkout() {
    alert("Processing payment...");
}
</script>

</body>
</html>
