<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mount Kenya University</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login-uni.css">
</head>

<body class="login-page-uni">

    <!-- Top Right Brand/Logo Placeholder -->
    <div class="uni-top-right-brand">
        <!-- Using text or image if available -->
        <h2 style="margin:0; color:#0044cc; font-weight:800;">UniRP&trade;</h2>
    </div>

    <!-- Main Floating Login Card -->
    <div class="uni-login-card">

        <!-- Decorative "Blobs" attached to card -->
        <div class="uni-accents-tr"></div>
        <div class="card-decoration-tr"></div>
        <div class="uni-accents-bl"></div>

        <!-- Card Content -->
        <div class="uni-logo-container">
            <img src="assets/logo.png" alt="University Logo" class="uni-logo">
            <div style="line-height:1.2;">
                <h3 style="margin:0; color:#003366; font-size:1.1rem;">Mount Kenya<br>University</h3>
            </div>
        </div>

        <h1 class="uni-title">Login</h1>

        <form id="loginForm">
            <!-- Username / Email -->
            <div class="uni-form-group">
                <input type="email" id="email" class="uni-input-field" placeholder="Email / Admission No" required>
            </div>

            <!-- Password -->
            <div class="uni-form-group">
                <input type="password" id="password" class="uni-input-field" placeholder="Password" required>
                <i class="fas fa-eye" style="position:absolute; right:15px; top:15px; color:#999; cursor:pointer;"></i>
            </div>

            <!-- Action Buttons -->
            <div class="uni-login-actions">
                <button type="submit" id="btn-login" class="uni-btn-primary">
                    Login
                </button>
                <a href="forgot-password.html" class="uni-link">Forgot Password ?</a>
            </div>

            <div id="errorMsg" style="color: red; margin-top: 10px; display: none;"></div>

            <!-- Hidden OTP Step (Preserved functionality just in case, though hidden in UI design) -->
            <div id="otp-container" style="display:none; margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
                <h4 style="margin-bottom:10px;">Verification Code</h4>
                <input type="text" id="otp-code" class="uni-input-field" placeholder="Enter 6-digit code"
                    style="margin-bottom:10px;">
                <button type="button" onclick="verify2FA()" class="uni-btn-primary" style="width:100%;">Verify</button>
            </div>

        </form>

        <div class="uni-footer-text">
            Powered By - <strong>Bloomfield Innovations</strong>
        </div>

    </div>

    <!-- Bottom Social Footer -->
    <div style="position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center; z-index: 5;">
        <div
            style="display: inline-flex; gap: 1rem; background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(5px);">
            <a href="#" style="color:white; font-size:1.2rem;"><i class="fab fa-facebook"></i></a>
            <a href="#" style="color:white; font-size:1.2rem;"><i class="fab fa-instagram"></i></a>
            <a href="#" style="color:white; font-size:1.2rem;"><i class="fab fa-youtube"></i></a>
            <a href="#" style="color:white; font-size:1.2rem;"><i class="fab fa-linkedin"></i></a>
        </div>
        <!-- Simple dots pager indicator aesthetic -->
        <div style="margin-top: 10px; display: flex; justify-content: center; gap: 5px;">
            <span style="width:8px; height:8px; background:white; border-radius:50%; opacity:0.5;"></span>
            <span style="width:8px; height:8px; background:#007bff; border-radius:50%;"></span>
            <span style="width:8px; height:8px; background:white; border-radius:50%; opacity:0.5;"></span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="auth.js"></script>
    <script>
        // Adapted Logic for New Design
        let loginMode = 'password';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errorDiv = document.getElementById('errorMsg');

            if (!email) return;

            // Simple loading state
            const originalText = btn.innerHTML;
            btn.innerHTML = '...';
            btn.disabled = true;

            // Assuming standard password login for this design
            const result = await Auth.login(email, password);

            if (result.success) {
                if (result.directLogin) {
                    window.location.href = 'index.html';
                } else {
                    // Show OTP input if needed (hidden by default in this design but supported)
                    document.getElementById('otp-container').style.display = 'block';
                    btn.style.display = 'none'; // Hide main login, show OTP
                }
                errorDiv.style.display = 'none';
            } else {
                errorDiv.innerText = result.message || "Login failed";
                errorDiv.style.display = 'block';
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        async function verify2FA() {
            const code = document.getElementById('otp-code').value;
            const res = await Auth.verifyOTP(code);
            if (res.success) {
                window.location.href = 'index.html';
            } else {
                alert(res.message || "Invalid OTP");
            }
        }
    </script>
</body>

</html>
