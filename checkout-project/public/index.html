<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Checkout</title>

<script src="https://js.stripe.com/v3/"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #0a0a0a;
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 40px;
}

.card {
    background: rgba(20, 20, 20, 0.9);
    padding: 25px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 20px;
}

h2, h3 {
    color: white;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: white;
    font-size: 14px;
    outline: none;
}

input:focus {
    border-color: #39ff14;
}

#card-element {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1a1a1a;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 15px;
    background: #39ff14;
    color: black;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background: #2dd30a;
}

button:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>Checkout</h2>

        <input id="name" placeholder="Full Name">
        <input id="email" placeholder="Email">

        <h3>Payment - Credit/Debit Card</h3>

        <div id="card-element"></div>

        <button onclick="pay()" id="cardButton">Pay with Card</button>
    </div>

    <div class="card">
        <h3>M-Pesa</h3>

        <input id="phone" placeholder="Phone (2547XXXXXXXX)">
        <button onclick="mpesa()" id="mpesaButton">Pay with M-Pesa</button>
    </div>

</div>

<script>
const stripe = Stripe("pk_test_YOUR_STRIPE_PUBLIC_KEY"); // Replace with your key

const elements = stripe.elements();
const card = elements.create("card", {
    style: {
        base: {
            color: '#ffffff',
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
            fontSize: '16px',
            '::placeholder': {
                color: '#666'
            }
        }
    }
});
card.mount("#card-element");

async function pay() {
    const cardButton = document.getElementById('cardButton');
    cardButton.disabled = true;
    cardButton.textContent = 'Processing...';

    const res = await fetch("/create-payment-intent", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount: 130 }) // $130 (in cents handled by server)
    });

    const data = await res.json();

    const result = await stripe.confirmCardPayment(data.clientSecret, {
        payment_method: {
            card: card,
            billing_details: {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value
            }
        }
    });

    if (result.error) {
        alert(result.error.message);
        cardButton.disabled = false;
        cardButton.textContent = 'Pay with Card';
    } else {
        alert("Payment Successful 🎉");
        cardButton.disabled = false;
        cardButton.textContent = 'Pay with Card';
    }
}

async function mpesa() {
    const phone = document.getElementById("phone").value;
    const mpesaButton = document.getElementById('mpesaButton');
    
    if (!phone || phone.length < 12) {
        alert('Please enter a valid Kenyan phone number (2547XXXXXXXX)');
        return;
    }

    mpesaButton.disabled = true;
    mpesaButton.textContent = 'Processing...';

    try {
        await fetch("/mpesa-pay", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone, amount: 130 })
        });
        alert("Check your phone for M-Pesa prompt 📲");
    } catch (error) {
        alert('Error: ' + error.message);
    } finally {
        mpesaButton.disabled = false;
        mpesaButton.textContent = 'Pay with M-Pesa';
    }
}
</script>

</body>
</html>
